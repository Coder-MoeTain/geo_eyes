services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data/models:/models
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # CPU worker: does NOT consume GPU training queue.
    command: celery -A app.worker.celery_app worker --loglevel=info -Q detect,change,import
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ai:/ai
      - ./data:/data
      - ./data/models:/models
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - titiler
    restart: unless-stopped

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    environment:
      - TITILER_API_NAME=GeoEye-TiTiler
    ports:
      - "8081:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  worker-gpu:
    profiles: ["gpu"]
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    # GPU worker: consumes GPU training queue.
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1 -Q detect,train_gpu,change,import
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
      - ./ai:/ai
      - ./data:/data
      - ./data/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  pgdata:
